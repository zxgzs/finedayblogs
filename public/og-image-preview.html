<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>OG Image Generator</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a1a3a;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
  }
  .container {
    text-align: center;
  }
  img {
    width: 1200px;
    height: 630px;
    border-radius: 4px;
  }
  .tip {
    color: #8ab4d8;
    margin-top: 16px;
    font-family: system-ui, sans-serif;
    font-size: 14px;
  }
</style>
</head>
<body>
<div class="container">
  <img src="og-image.svg" alt="晴天的博客 OG Image" />
  <p class="tip">💡 右键图片 → 另存为 → 选择 PNG/JPG 格式即可用于社交平台分享</p>
</div>
</body>
</html>
