# EdgeOne Pages 配置文件
version: 1.0.0
name: qing-tian-blog

# 构建配置
build:
  # 构建命令
  command: npm run build
  # 输出目录
  output: dist

# 环境变量
env:
  NODE_VERSION: "18"

# 部署配置
deploy:
  # 静态资源配置
  static:
    # 缓存策略
    cache:
      # HTML 不缓存
      - pattern: "**/*.html"
        max_age: 0
      # 图片缓存 30 天
      - pattern: "**/*.{png,jpg,jpeg,gif,webp,svg,ico}"
        max_age: 2592000
      # JS/CSS 缓存 7 天
      - pattern: "**/*.{js,css}"
        max_age: 604800
